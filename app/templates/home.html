{% extends 'base.html' %}
{% import 'macros/form_macros.html' as f %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/rule/rulesCarousel.css') }}">
{% endblock %}
{% block content %}
<div class="container py-5" id="main-container">
    <template v-if="is_loading">
        <div class="row mb-5 align-items-center">
            <div class="col-lg-8">
                <h1 class="display-5 fw-bold text-dark mb-2">
                    Security Intelligence <span class="text-primary">Repository </span>
                    <small class="fw-light opacity-50">with </small>
                    <span class="rulezet-brand"> RULEZET</span>
                    <span class="badge rounded-pill bg-light text-muted fw-normal border ms-2"
                        style="font-size: 0.9rem; vertical-align: middle;">
                        v1.4.1
                    </span>
                </h1>
                <p class="lead text-muted">
                    <a href="/why_choose_rulezet" class="ms-2" title="Why choose Rulezet?"
                        style="font-size:medium; vertical-align: middle; text-decoration: underline;">
                        <i class="fa-solid fa-question-circle text-muted"></i> Why choose Rulezet?
                    </a>
                    <br>
                    Explore the latest community-contributed detection rules. Stay ahead of threats with
                    real-time updates.
                </p>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="p-4 rounded-4 border-start border-primary border-4 shadow-sm h-100"
                        style="background-color: var(--card-bg-color);">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-shape bg-primary-subtle text-primary rounded-circle p-2 me-3">
                                <i class="fa-solid fa-magnifying-glass-chart"></i>
                            </div>
                            <h6 class="fw-bold mb-0">Explore Intelligence</h6>
                        </div>
                        <p class="small text-muted mb-3">Browse our curated database of YARA, Sigma, and other rules
                            shared by security experts worldwide.</p>
                        <a href="/rule/rules_list" class="text-primary text-decoration-none small fw-bold underline">
                            View full catalog <i class="fa-solid fa-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-4 rounded-4 border-start border-success border-4 shadow-sm h-100"
                        style="background-color: var(--card-bg-color);">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-shape bg-success-subtle text-success rounded-circle p-2 me-3">
                                <i class="fa-solid fa-plus"></i>
                            </div>
                            <h6 class="fw-bold mb-0">Contribute Rules</h6>
                        </div>
                        <p class="small text-muted mb-3">Join the defense community! Upload your own detection assets to
                            help others track emerging threats.</p>
                        <a href="/rule/create_rule" class="text-success text-decoration-none small fw-bold underline">
                            Submit an asset <i class="fa-solid fa-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-4 rounded-4 border-start border-warning border-4 shadow-sm h-100"
                        style="background-color: var(--card-bg-color);">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-shape bg-warning-subtle text-warning rounded-circle p-2 me-3">
                                <i class="fa-solid fas fas fa-boxes"></i>
                            </div>
                            <h6 class="fw-bold mb-0">Bundle Rules</h6>
                        </div>
                        <p class="small text-muted mb-3">Organize your detection assets into bundles for easy sharing
                            and management.</p>
                        <a href="/bundle/list" class="text-warning text-decoration-none small fw-bold underline">
                            Go to bundles <i class="fa-solid fa-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>

            <hr class="opacity-10 mb-5 anim">

            <div class="d-flex align-items-center justify-content-between mb-4">
                <h4 class="fw-bold mb-0">Recently Added <span class="text-primary">Intelligence</span></h4>
                <p class="text-muted small mb-0 d-none d-lg-block">Review the latest 12 assets updated by the community.
                </p>
            </div>
        </div>

        <!-- ===================== CAROUSEL ===================== -->
        <template v-if="rules_list.length > 0">

            <!-- Wrapper avec flèches gauche/droite au niveau des cartes -->
            <div class="carousel-rules-wrapper">

                <!-- Flèche gauche -->
                <button class="carousel-arrow carousel-arrow--left" @click="carouselSlide(-1)"
                    :disabled="carouselIndex === 0" title="Previous">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <!-- Outer : overflow hidden + fades -->
                <div class="carousel-rules-outer"
                    :class="{ 'at-start': carouselIndex === 0, 'at-end': carouselIndex >= rules_list.length - carouselVisible }"
                    ref="carouselOuter">

                    <!-- Track -->
                    <div class="carousel-rules-track" ref="carouselTrack"
                        :style="{ transform: 'translateX(-' + carouselOffset + 'px)', transition: isDragging ? 'none' : 'transform 0.42s cubic-bezier(0.4,0,0.2,1)' }"
                        @mousedown="dragStart" @touchstart.passive="touchStart" @touchmove.passive="touchMove"
                        @touchend="touchEnd">

                        <!-- ===== CARTE ORIGINALE — 100% inchangée ===== -->
                        <div class="carousel-item-wrap" v-for="(rule, index) in rules_list" :key="rule.uuid">
                            <div class="card h-100 shadow-sm border-0"
                                style="position: relative; overflow: hidden; border-radius: 12px;">

                                <div class="premium-accent-line"></div>

                                <div class="card-watermark">
                                    <i class="fa-solid fa-shield-halved"></i>
                                </div>

                                <div class="position-absolute top-0 end-0 mt-3 me-3 shadow-sm z-index-2">
                                    <span class="badge rounded-pill bg-dark pt-1">[[ rule.format.toUpperCase() ]]</span>
                                </div>

                                <div class="card-body d-flex flex-column p-4 z-index-1">
                                    <div class="mb-3 pe-5">
                                        <h5 class="fw-bold mb-1">
                                            <a :href="`/rule/detail_rule/${rule.id}`"
                                                class="fw-bold h5 mb-4 border-start border-primary border-4 ps-3 custom-rule-link"
                                                title="See more about this rule">
                                                [[ rule.title ]]
                                            </a>
                                        </h5>
                                        <div class="d-flex align-items-center gap-2 mt-2">
                                            <div class="avatar-circle-xs" title="Author of the rule">
                                                <template v-if="rule.author === 'Unknown'">
                                                    [[ rule.editor[0].toUpperCase() ]]
                                                </template>
                                                <template v-else>
                                                    [[ rule.author[0].toUpperCase() ]]
                                                </template>
                                            </div>
                                            <small class="text-muted fw-medium" title="Author of the rule">
                                                <template v-if="rule.author === 'Unknown'">
                                                    [[ rule.editor ]]
                                                </template>
                                                <template v-else>
                                                    [[ rule.author ]]
                                                </template>
                                            </small>
                                            <span class="text-muted opacity-50">|</span>
                                            <small class="text-muted" title="Last modification of the rule">[[
                                                dayjs.utc(rule.last_modif).fromNow() ]]</small>
                                        </div>
                                    </div>

                                    <div class="flex-grow-1">
                                        <p class="text-muted small lh-base" title="Description of the rule">
                                            <template v-if="!rule.show_full">
                                                [[ rule.description.substring(0, 140) ]]
                                                <span v-if="rule.description.length > 140">...</span>
                                                <a v-if="rule.description.length > 140" href="#"
                                                    @click.prevent="rule.show_full = true"
                                                    class="text-primary text-decoration-none fw-semibold ms-1">Read
                                                    more</a>
                                            </template>
                                            <template v-else>
                                                [[ rule.description ]]
                                                <a href="#" @click.prevent="rule.show_full = false"
                                                    class="text-primary text-decoration-none fw-semibold ms-1">Show
                                                    less</a>
                                            </template>
                                        </p>
                                    </div>

                                    <div class="mb-3" @click.stop>
                                        <vulnerability-displays-list object-type="rule" :object-id="rule.id"
                                            :max-visible="1">
                                        </vulnerability-displays-list>
                                    </div>
                                    <div class="mb-3" @click.stop>
                                        <tags-displays-list object-type="rule" :object-id="rule.id" :max-visible="1">
                                        </tags-displays-list>
                                    </div>

                                    <div
                                        class="d-flex justify-content-between align-items-center pt-3 border-top mt-auto bg-transparent">
                                        <div class="btn-group shadow-sm border rounded-pill overflow-hidden">
                                            <button @click="vote('up', rule.id); animateClick($event)"
                                                class="btn btn-sm px-3 border-0 border-end border-light shadow-none btn-animate home-btn"
                                                title="Like this rule">
                                                <i class="fas fa-thumbs-up text-primary me-1"></i> [[ rule.vote_up ]]
                                            </button>
                                            <button @click="vote('down', rule.id); animateClick($event)"
                                                class="btn btn-sm px-3 border-0 shadow-none btn-animate home-btn"
                                                title="Dislike this rule">
                                                <i class="fas fa-thumbs-down text-danger me-1"></i> [[ rule.vote_down ]]
                                            </button>
                                        </div>

                                        <div class="d-flex gap-2">
                                            <button
                                                @click="favorite(rule.id); $event.currentTarget.classList.add('star-animate')"
                                                @animationend="$event.currentTarget.classList.remove('star-animate')"
                                                :title="rule.is_favorited ? 'Unfavorite this rule' : 'Favorite this rule'"
                                                class="btn btn-sm rounded-circle shadow-sm p-0 d-flex align-items-center justify-content-center transition-all home-btn"
                                                style="width: 32px; height: 32px;">
                                                <i class="fa-star"
                                                    :class="rule.is_favorited ? 'fas text-warning' : 'far'"></i>
                                            </button>

                                            <div class="dropdown">
                                                <button
                                                    class="btn btn-sm rounded-circle shadow-sm p-0 d-flex align-items-center justify-content-center home-btn"
                                                    style="width: 32px; height: 32px;" data-bs-toggle="dropdown">
                                                    <i class="fas fa-ellipsis-h"></i>
                                                </button>
                                                <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                                    <li
                                                        v-if="parseInt('{{ current_user.id }}') === rule.user_id || current_user_is_admin">
                                                        <a class="dropdown-item" :href="`rule/edit_rule/${rule.id}`">
                                                            <i class="fas fa-edit me-2 text-muted"></i> Edit Rule
                                                        </a>
                                                    </li>
                                                    <li>
                                                        <a class="dropdown-item" :href="`/rule/report/${rule.id}`">
                                                            <i class="fas fa-flag me-2 text-muted"></i> Report issue
                                                        </a>
                                                    </li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- ===== FIN CARTE ORIGINALE ===== -->

                    </div>
                </div>

                <!-- Flèche droite -->
                <button class="carousel-arrow carousel-arrow--right" @click="carouselSlide(1)"
                    :disabled="carouselIndex >= rules_list.length - carouselVisible" title="Next">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

            </div><!-- fin carousel-rules-wrapper -->

            <!-- Dots de navigation -->
            <div class="carousel-rules-dots">
                <button class="carousel-rules-dot" v-for="(_, i) in carouselDots" :key="i"
                    :class="{ active: i === carouselIndex }" @click="carouselGoTo(i)">
                </button>
            </div>

            <!-- See more button -->
            <div class="text-center mt-5 mb-4">
                <a href="/rule/rules_list" class="btn btn-more-rules px-4 py-2 rounded-pill fw-bold">
                    <span>See more rules</span>
                    <i class="fa-solid fa-arrow-right ms-2 transition-arrow"></i>
                </a>
            </div>

        </template>

        <template v-else>
            <div class="col-12 text-center py-5">
                <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" alt="No rules"
                    style="width: 80px; opacity: 0.3;">
                <p class="text-muted mt-3">No recent rules found. Check back later!</p>
            </div>
        </template>
        <!-- ================== FIN CAROUSEL ================== -->

    </template>
    <template v-else>
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block script %}

<script type="module">
    const { createApp, ref, computed, onMounted, onBeforeUnmount, nextTick } = Vue
    import { message_list, create_message } from '/static/js/toaster.js'
    import VulnerabilityDisplaysList from '/static/js/vulnerability/vulnerabilityDisplayList.js';
    import TagsDisplaysList from '/static/js/tags/tagsDisplaysList.js';

    createApp({
        delimiters: ['[[', ']]'],
        components: {
            'vulnerability-displays-list': VulnerabilityDisplaysList,
            'tags-displays-list': TagsDisplaysList
        },
        setup() {
            const is_loading = ref(false)
            const rules_list = ref([])
            const current_user_is_admin = ref(false)
            const current_user_is_connected = ref(false)

            /* ── état carrousel ── */
            const carouselIndex = ref(0)
            const carouselOffset = ref(0)
            const carouselVisible = ref(3)
            const isDragging = ref(false)
            let dragStartX = 0
            let touchStartX = 0
            let resizeObserver = null

            const carouselOuter = ref(null)
            const carouselTrack = ref(null)

            const carouselDots = computed(() =>
                Math.max(0, rules_list.value.length - carouselVisible.value + 1)
            )

            function getItemWidth() {
                if (!carouselTrack.value) return 0
                const item = carouselTrack.value.querySelector('.carousel-item-wrap')
                if (!item) return 0
                return item.offsetWidth + 24
            }

            function updateVisible() {
                const w = carouselOuter.value?.offsetWidth || window.innerWidth
                if (w < 576) carouselVisible.value = 1
                else if (w < 992) carouselVisible.value = 2
                else carouselVisible.value = 3
                const max = Math.max(0, rules_list.value.length - carouselVisible.value)
                if (carouselIndex.value > max) carouselIndex.value = max
                updateOffset()
            }

            function updateOffset() {
                carouselOffset.value = carouselIndex.value * getItemWidth()
            }

            function carouselSlide(dir) {
                const max = Math.max(0, rules_list.value.length - carouselVisible.value)
                carouselIndex.value = Math.max(0, Math.min(carouselIndex.value + dir, max))
                updateOffset()
            }

            function carouselGoTo(i) {
                carouselIndex.value = i
                updateOffset()
            }

            /* drag souris */
            function dragStart(e) {
                isDragging.value = true
                dragStartX = e.clientX
                window.addEventListener('mousemove', dragMove)
                window.addEventListener('mouseup', dragEnd)
            }
            function dragMove(e) {
                if (!isDragging.value) return
                const base = carouselIndex.value * getItemWidth()
                carouselOffset.value = base + (dragStartX - e.clientX)
            }
            function dragEnd(e) {
                if (!isDragging.value) return
                isDragging.value = false
                window.removeEventListener('mousemove', dragMove)
                window.removeEventListener('mouseup', dragEnd)
                const diff = dragStartX - e.clientX
                if (Math.abs(diff) > 60) carouselSlide(diff > 0 ? 1 : -1)
                else updateOffset()
            }

            /* swipe tactile */
            function touchStart(e) { touchStartX = e.touches[0].clientX }
            function touchMove(e) {
                const base = carouselIndex.value * getItemWidth()
                carouselOffset.value = base + (touchStartX - e.touches[0].clientX)
            }
            function touchEnd(e) {
                const diff = touchStartX - e.changedTouches[0].clientX
                if (Math.abs(diff) > 50) carouselSlide(diff > 0 ? 1 : -1)
                else updateOffset()
            }

            /* ── fonctions existantes ── */
            async function fetchRecentRules() {
                const res = await fetch('/get_last_rules')
                if (res.status == 200) {
                    const data = await res.json()
                    rules_list.value = (data.rules || []).map(r => ({ ...r, show_full: false }))
                }
            }

            async function checkIfUserIsConnected() {
                const res = await fetch('/get_current_user_connected')
                const data = await res.json()
                current_user_is_connected.value = data.is_authenticated
                if (data.is_authenticated) {
                    const userRes = await fetch('/rule/get_current_user')
                    const userData = await userRes.json()
                    current_user_is_admin.value = userData.user
                }
            }

            async function favorite(rule_id) {
                if (!current_user_is_connected.value) { window.location.href = `/account/login`; return }
                const res = await fetch(`/rule/favorite/${rule_id}`)
                const data = await res.json()
                if (res.ok) {
                    const rule = rules_list.value.find(r => r.id === rule_id)
                    if (rule) rule.is_favorited = data.is_favorited
                }
                create_message(data.message, data.toast_class, false, null, "/rule/owner_rules")
            }

            async function vote(voteType, ruleId) {
                if (!current_user_is_connected.value) { window.location.href = `/account/login`; return }
                const res = await fetch(`/rule/vote_rule?id=${ruleId}&vote_type=${voteType}`)
                const data = await res.json()
                const updated = rules_list.value.find(rule => rule.id === ruleId)
                if (updated) { updated.vote_up = data.vote_up; updated.vote_down = data.vote_down }
            }

            function animateClick(event) {
                const btn = event.currentTarget
                btn.classList.add('click-pop')
                setTimeout(() => btn.classList.remove('click-pop'), 300)
            }

            function parsedCVE(cveField) {
                if (!cveField) return []
                try {
                    const parsed = typeof cveField === 'string' ? JSON.parse(cveField) : cveField
                    return Array.isArray(parsed) ? parsed : [parsed]
                } catch (e) {
                    return cveField.replace(/[{}]/g, "").split(",").map(s => s.trim()).filter(s => s !== "")
                }
            }

            function getCVEColor(cve) {
                const c = cve.toUpperCase()
                if (c.startsWith("CVE")) return "bg-danger"
                if (c.startsWith("GHSA")) return "bg-warning text-dark"
                if (c.startsWith("PYSEC")) return "bg-info text-dark"
                if (c.startsWith("RHSA") || c.startsWith("MS")) return "bg-purple"
                return "bg-secondary"
            }

            async function init() {
                is_loading.value = false
                await Promise.all([fetchRecentRules(), checkIfUserIsConnected()])
                is_loading.value = true
                await nextTick()
                updateVisible()
                resizeObserver = new ResizeObserver(() => updateVisible())
                if (carouselOuter.value) resizeObserver.observe(carouselOuter.value)
            }

            onMounted(() => init())
            onBeforeUnmount(() => {
                if (resizeObserver) resizeObserver.disconnect()
                window.removeEventListener('mousemove', dragMove)
                window.removeEventListener('mouseup', dragEnd)
            })

            return {
                message_list,
                rules_list,
                current_user_is_admin,
                current_user_is_connected,
                dayjs,
                vote,
                favorite,
                parsedCVE,
                getCVEColor,
                animateClick,
                is_loading,
                carouselIndex,
                carouselOffset,
                carouselVisible,
                carouselDots,
                isDragging,
                carouselOuter,
                carouselTrack,
                carouselSlide,
                carouselGoTo,
                dragStart,
                touchStart,
                touchMove,
                touchEnd,
            }
        }
    }).mount('#main-container')
</script>
{% endblock %}
