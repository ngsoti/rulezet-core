{% extends 'base.html' %}
{% import 'macros/form_macros.html' as f %}

{% block content %}
<div class="container mt-5" id="main-container" v-cloak>

  <div class="mb-4 border-bottom pb-3 text-center">
    <h2 class="fw-bold mb-1 text-primary">GitHub Project URLs</h2>
    <div class="mx-auto" style="width: 60px; height: 4px; background-color: #0d6efd; border-radius: 2px;"></div>
    <p class="text-muted mt-2">
      Manage and perform bulk actions on GitHub repositories associated with your detection rules.
    </p>
  </div>

  <github-selection-table api-endpoint="/rule/get_url_github" submit-endpoint="/rule/bulk_action_github"
    csrf-token="{{ csrf_token() }}" current-user-is-admin="{{ 'true' if current_user.is_admin() else 'false' }}">
  </github-selection-table>

  <div class="d-flex justify-content-center gap-3 mt-5 mb-3">
    <a href="javascript:history.back()"
      class="btn btn-secondary btn-sm d-inline-flex align-items-center shadow-sm px-4 py-2 rounded-pill">
      <i class="fas fa-arrow-left me-2"></i>
      Back
    </a>
  </div>

</div>
{% endblock %}

{% block script %}
<script type="module">
  const { createApp } = Vue
  import GitHubSelectionTable from '/static/js/rule/github/githubSelectionTable.js';
  import { message_list } from '/static/js/toaster.js'

  createApp({
    delimiters: ['[[', ']]'],
    components: {
      'github-selection-table': GitHubSelectionTable
    },
    setup() {

      return { message_list }
    }
  }).mount('#main-container')
</script>

{% endblock %}
